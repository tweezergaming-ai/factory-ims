<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Factory Inventory Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .navbar {
            background-color: #1e293b;
        }
        .navbar-brand {
            color: white !important;
        }
        .card {
            border-radius: 15px;
        }
        .dashboard-card {
            text-align: center;
            padding: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        footer {
            margin-top: 30px;
            padding: 15px;
            text-align: center;
            background: #1e293b;
            color: white;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Factory Inventory System</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Dashboard -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card dashboard-card bg-primary text-white">
                Total Products
                <div id="totalProducts">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card dashboard-card bg-success text-white">
                Total Quantity
                <div id="totalQuantity">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card dashboard-card bg-warning text-dark">
                Total Value
                <div id="totalValue">₹0</div>
            </div>
        </div>
    </div>

    <!-- Add Product Form -->
    <div class="card p-4 mb-4">
        <h4>Add Product</h4>
        <div class="row">
            <div class="col-md-3">
                <input type="text" id="productName" class="form-control" placeholder="Product Name">
            </div>
            <div class="col-md-2">
                <input type="number" id="quantity" class="form-control" placeholder="Quantity">
            </div>
            <div class="col-md-2">
                <input type="number" id="price" class="form-control" placeholder="Price">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addProduct()">Add</button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card p-4">
        <h4>Inventory List</h4>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryTable">
            </tbody>
        </table>
    </div>

</div>

<footer>
    © 2026 Factory Inventory Management System | Developed by Tweezergaming-ai
</footer>

<script>
    let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

    function saveData() {
        localStorage.setItem("inventory", JSON.stringify(inventory));
    }

    function updateDashboard() {
        document.getElementById("totalProducts").innerText = inventory.length;

        let totalQty = 0;
        let totalVal = 0;

        inventory.forEach(item => {
            totalQty += item.quantity;
            totalVal += item.quantity * item.price;
        });

        document.getElementById("totalQuantity").innerText = totalQty;
        document.getElementById("totalValue").innerText = "₹" + totalVal;
    }

    function renderTable() {
        const table = document.getElementById("inventoryTable");
        table.innerHTML = "";

        inventory.forEach((item, index) => {
            table.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.quantity}</td>
                    <td>₹${item.price}</td>
                    <td>₹${item.quantity * item.price}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${index})">Delete</button>
                    </td>
                </tr>
            `;
        });

        updateDashboard();
        saveData();
    }

    function addProduct() {
        const name = document.getElementById("productName").value;
        const quantity = parseInt(document.getElementById("quantity").value);
        const price = parseInt(document.getElementById("price").value);

        if (!name || !quantity || !price) {
            alert("Please fill all fields");
            return;
        }

        inventory.push({ name, quantity, price });

        document.getElementById("productName").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("price").value = "";

        renderTable();
    }

    function deleteProduct(index) {
        inventory.splice(index, 1);
        renderTable();
    }

    renderTable();
</script>

</body>
</html>
